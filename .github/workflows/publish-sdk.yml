name: Publish CodeFlow SDK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publishing target"
        required: true
        default: "github"
        type: choice
        options:
          - github
          - mavenCentral
          - both

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and test
        run: ./gradlew :codeflow-sdk:assembleRelease :codeflow-sdk:test

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'release' || inputs.target == 'github' || inputs.target == 'both' }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :codeflow-sdk:publishMavenPublicationToGitHubPackagesRepository

      - name: Publish to Maven Central (Sonatype Central Portal)
        if: ${{ inputs.target == 'mavenCentral' || inputs.target == 'both' }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :codeflow-sdk:publishToMavenCentral --no-configuration-cache
